server:
  port: ${PORT:8080}
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bootcamp}
    username: ${DB_USERNAME:${USER:postgres}}
    password: ${DB_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

finnhub:
  api:
    key: ${FINNHUB_API_KEY:d91jb81r01qqfqkcgb20d91jb81r01qqfqkcgb2g}
